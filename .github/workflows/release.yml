name: Draft Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Check release version
        run: npm run version:check

      - name: Test release tooling
        run: npm run test:version

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test:run

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS ARM64
            platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - label: macOS x64
            platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
          - label: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: AgentPalette v__VERSION__
          releaseBody: |
            AgentPalette internal preview build.

            This release is unsigned on Windows and ad-hoc signed on macOS. See README.md for installation warnings.
          releaseDraft: true
          prerelease: true
          uploadUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
